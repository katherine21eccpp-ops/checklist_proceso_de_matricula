<style>
    .admin-checklist {
        font-family: 'Segoe UI', Arial, sans-serif;
        max-width: 600px;
        margin: 10px auto;
        border: 2px solid #a61d21; /* Rojo Institucional */
        border-radius: 8px;
        overflow: hidden;
        background-color: #fff;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .admin-header {
        background-color: #a61d21;
        color: #d4af37; /* Dorado */
        padding: 12px;
        text-align: center;
        text-transform: uppercase;
        font-weight: bold;
        font-size: 1rem;
        letter-spacing: 1px;
    }

    .admin-section {
        padding: 15px;
        border-bottom: 1px solid #eee;
    }

    .admin-section:last-child {
        border-bottom: none;
    }

    .admin-section h4 {
        margin: 0 0 10px 0;
        color: #a61d21;
        font-size: 0.85rem;
        text-transform: uppercase;
        border-bottom: 1px solid #d4af37;
        display: block;
        padding-bottom: 3px;
    }

    .check-item {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: #333;
        cursor: pointer;
    }

    .check-item input[type="checkbox"] {
        margin-right: 12px;
        width: 17px;
        height: 17px;
        cursor: pointer;
        accent-color: #a61d21;
    }

    .info-tag {
        background-color: #f8f9fa;
        border-left: 3px solid #6c757d; /* Gris */
        padding: 6px 12px;
        margin-top: 4px;
        font-size: 0.82rem;
        color: #666;
        font-style: italic;
    }

    .doc-group {
        padding-left: 5px;
    }
</style>
